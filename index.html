<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Check-in</title>

  <style>
    :root {
      --ink: #18251d;
      --muted: #607064;
      --line: rgba(24, 37, 29, 0.1);
      --glass: rgba(255, 255, 255, 0.74);
      --mint: #c9f3d4;
      --mint-deep: #216542;
      --shadow: 0 22px 70px rgba(35, 64, 43, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 9% 10%, rgba(255, 236, 167, 0.8) 0 9%, transparent 27%),
        radial-gradient(circle at 86% 12%, rgba(183, 238, 202, 0.95) 0 8%, transparent 29%),
        radial-gradient(circle at 72% 88%, rgba(176, 221, 255, 0.75) 0 11%, transparent 29%),
        linear-gradient(135deg, #f9f8ee 0%, #e9f4ed 47%, #eef7f1 100%);
      padding: 46px 20px 64px;
    }

    .wrap {
      width: min(100%, 800px);
      margin: auto;
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.75);
      color: var(--mint-deep);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      margin: 15px 0 6px;
      font-size: clamp(2.35rem, 7vw, 4.55rem);
      line-height: 0.95;
      letter-spacing: -0.065em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      border-radius: 27px;
      padding: clamp(22px, 5vw, 38px);
    }

    .question {
      font-size: clamp(1.75rem, 5vw, 2.55rem);
      margin: 0 0 24px;
      letter-spacing: -0.045em;
    }

    label {
      display: block;
      font-size: 0.87rem;
      font-weight: 750;
      margin: 17px 0 8px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 15px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.68);
      outline: none;
      font: inherit;
    }

    input:focus,
    textarea:focus {
      border-color: #5bb777;
      box-shadow: 0 0 0 4px rgba(91, 183, 119, 0.14);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 5px 0 4px;
    }

    .choice {
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 17px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.5);
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 850;
      font-size: 1.1rem;
    }

    .choice:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.82);
    }

    .choice.active.yes {
      background: var(--mint);
      border-color: #9edeb1;
      color: #164c30;
    }

    .choice.active.no {
      background: #ffe8e4;
      border-color: #ffc9c1;
      color: #8f3326;
    }

    .emoji {
      font-size: 1.48rem;
    }

    .extra {
      display: none;
    }

    .extra.show {
      display: block;
    }

    .submit {
      margin-top: 23px;
      border: 0;
      width: 100%;
      border-radius: 15px;
      padding: 16px;
      cursor: pointer;
      background: var(--ink);
      color: white;
      font: inherit;
      font-weight: 800;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .submit:hover {
      background: #2e4838;
      transform: translateY(-2px);
    }

    .hint {
      margin: 13px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .board {
      margin-top: 20px;
    }

    .board-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .board h2 {
      margin: 0;
      font-size: 1.32rem;
    }

    .count {
      font-size: 0.83rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.64);
      padding: 7px 10px;
      border-radius: 999px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
      margin: 20px 0;
    }

    .stat {
      border-radius: 17px;
      padding: 17px;
    }

    .stat.y {
      background: rgba(187, 239, 204, 0.56);
    }

    .stat.n {
      background: rgba(255, 226, 221, 0.6);
    }

    .stat strong {
      display: block;
      font-size: 1.75rem;
    }

    .stat span {
      font-size: 0.84rem;
      color: var(--muted);
    }

    .entries {
      display: grid;
      gap: 10px;
    }

    .entry {
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.67);
      border-radius: 16px;
      padding: 14px 15px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
    }

    .entry-name {
      font-weight: 850;
    }

    .entry-detail {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .pill {
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 7px 9px;
      border-radius: 999px;
    }

    .pill.yes {
      background: #d7f6df;
      color: #1e643d;
    }

    .pill.no {
      background: #ffe3de;
      color: #963829;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 0 3px;
      font-size: 0.92rem;
    }

    .reset {
      border: none;
      background: none;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
      font: inherit;
      font-size: 0.78rem;
      padding: 12px 0 0;
    }

    footer {
      text-align: center;
      padding: 23px 0 0;
      color: #718278;
      font-size: 0.8rem;
    }

    @media (max-width: 520px) {
      .entry {
        flex-direction: column;
        gap: 8px;
      }

      .pill {
        align-self: flex-start;
      }
    }
  </style>

</head>

<body>
  <main class="wrap">
    <header>
      <div class="eyebrow">✦ tiny group ritual</div>
      <h1>Gym Check-in</h1>
      <p class="subtitle">Are we working out today?</p>
    </header>

```
<section class="card">
  <h2 class="question">Today 健身吗？</h2>

  <label for="name">Your name</label>
  <input id="name" maxlength="30" placeholder="例如 Peter" />

  <label>Your answer</label>

  <div class="choices">
    <button class="choice yes" data-vote="yes" type="button">
      <span>Yes, let's go</span>
      <span class="emoji">💪</span>
    </button>

    <button class="choice no" data-vote="no" type="button">
      <span>Not today</span>
      <span class="emoji">🛋️</span>
    </button>
  </div>

  <div class="extra" id="extra">
    <label for="time">What time works?</label>
    <input id="time" type="time" />

    <label for="note">备注（可选）</label>
    <textarea id="note" maxlength="160" placeholder="比如：Leg day？健身房门口见？"></textarea>
  </div>

  <button class="submit" id="submit" type="button">Add my vote</button>

  <p class="hint">同一个名字再次投票会更新你的回答。</p>
</section>

<section class="card board">
  <div class="board-top">
    <h2>Today's crew</h2>
    <span class="count" id="count">0 responses</span>
  </div>

  <div class="summary">
    <div class="stat y">
      <strong id="yesCount">0</strong>
      <span>ready to move</span>
    </div>

    <div class="stat n">
      <strong id="noCount">0</strong>
      <span>taking a rest day</span>
    </div>
  </div>

  <div class="entries" id="entries"></div>

  <button class="reset" id="reset" type="button">
    Clear this device's demo votes
  </button>
</section>

<footer>Made for friends who need a tiny nudge.</footer>
```

  </main>

  <script>
    const STORAGE = "gym-checkin-v1";

    let selectedVote = "";

    const nameInput = document.getElementById("name");
    const timeInput = document.getElementById("time");
    const noteInput = document.getElementById("note");
    const extra = document.getElementById("extra");
    const entries = document.getElementById("entries");
    const yesCount = document.getElementById("yesCount");
    const noCount = document.getElementById("noCount");
    const count = document.getElementById("count");
    const submitButton = document.getElementById("submit");
    const resetButton = document.getElementById("reset");

    const choices = [...document.querySelectorAll(".choice")];

    function loadVotes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE)) || [];
      } catch {
        return [];
      }
    }

    function saveVotes(votes) {
      localStorage.setItem(STORAGE, JSON.stringify(votes));
    }

    function escapeHTML(value) {
      const div = document.createElement("div");
      div.textContent = value;
      return div.innerHTML;
    }

    function renderVotes() {
      const votes = loadVotes();

      const yesVotes = votes.filter(vote => vote.vote === "yes").length;
      const noVotes = votes.filter(vote => vote.vote === "no").length;

      yesCount.textContent = yesVotes;
      noCount.textContent = noVotes;

      count.textContent =
        votes.length + " response" + (votes.length === 1 ? "" : "s");

      if (votes.length === 0) {
        entries.innerHTML =
          '<div class="empty">No votes yet — be the first brave soul.</div>';
        return;
      }

      entries.innerHTML = votes
        .map(vote => {
          let detail = "";

          if (vote.vote === "yes") {
            detail = vote.time
              ? "⏰ " + escapeHTML(vote.time)
              : "Time not set yet";

            if (vote.note) {
              detail += "<br>💬 " + escapeHTML(vote.note);
            }
          } else {
            detail = "Rest day";
          }

          return `
            <div class="entry">
              <div>
                <div class="entry-name">${escapeHTML(vote.name)}</div>
                <div class="entry-detail">${detail}</div>
              </div>

              <span class="pill ${vote.vote}">
                ${vote.vote === "yes" ? "YES 💪" : "NO ✦"}
              </span>
            </div>
          `;
        })
        .join("");
    }

    choices.forEach(button => {
      button.addEventListener("click", () => {
        selectedVote = button.dataset.vote;

        choices.forEach(choice => {
          choice.classList.remove("active");
        });

        button.classList.add("active");

        if (selectedVote === "yes") {
          extra.classList.add("show");
        } else {
          extra.classList.remove("show");
        }
      });
    });

    submitButton.addEventListener("click", () => {
      const name = nameInput.value.trim();
      const time = timeInput.value;
      const note = noteInput.value.trim();

      if (!name) {
        nameInput.focus();
        return;
      }

      if (!selectedVote) {
        alert("Please choose Yes or No first.");
        return;
      }

      const votes = loadVotes();

      const record = {
        name: name,
        vote: selectedVote,
        time: selectedVote === "yes" ? time : "",
        note: selectedVote === "yes" ? note : ""
      };

      const existingIndex = votes.findIndex(
        vote => vote.name.toLowerCase() === name.toLowerCase()
      );

      if (existingIndex >= 0) {
        votes[existingIndex] = record;
      } else {
        votes.unshift(record);
      }

      saveVotes(votes);

      nameInput.value = "";
      timeInput.value = "";
      noteInput.value = "";
      selectedVote = "";

      choices.forEach(choice => {
        choice.classList.remove("active");
      });

      extra.classList.remove("show");

      renderVotes();
    });

    resetButton.addEventListener("click", () => {
      localStorage.removeItem(STORAGE);
      renderVotes();
    });

    renderVotes();
  </script>

</body>
</html>
